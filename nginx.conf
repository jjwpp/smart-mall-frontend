# ============================================================
# Smart Mall Nginx 反向代理
# ============================================================

server {
    listen 80;
    server_name _;
    client_max_body_size 20m;

    # 前端静态文件
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 支付宝支付 API
    location /api/pay/ {
        proxy_pass http://user-backend:8202;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 用户端 API
    location /user/ {
        proxy_pass http://user-backend:8202;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 管理端 API
    location /admin/ {
        proxy_pass http://admin-backend:8201;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 认证 API（在 admin 模块）
    location /api/auth/ {
        proxy_pass http://admin-backend:8201;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
